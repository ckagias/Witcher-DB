<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Feedback | The Witcher DB</title>
        <link
            rel="stylesheet"
            type="text/css"
            href="https://fonts.googleapis.com/css2?family=Cinzel&amp;family=Lora&amp;display=swap"
        />
        <link rel="stylesheet" type="text/css" href="css/style.css" />
        <link rel="icon" type="image/x-icon" href="images/favicon.png" />
        <script src="js/main.js"></script>
    </head>
    <body class="feedback-page">
        <div class="site-bg site-bg--feedback">
            <div class="overlay"></div>
            <div class="nav-wrap">
                <div class="nav">
                    <div class="nav-mobile-bar">
                        <div class="nav-mobile-spacer" aria-hidden="true"></div>
                        <span class="nav-mobile-title">The Witcher DB</span>
                        <button
                            type="button"
                            class="menu-btn"
                            onclick="toggleMenu()"
                            aria-controls="nav-menu"
                            aria-expanded="false"
                            aria-label="Toggle navigation menu"
                        >
                            <span class="menu-btn__bar"></span>
                            <span class="menu-btn__bar"></span>
                            <span class="menu-btn__bar"></span>
                        </button>
                    </div>
                    <div id="nav-menu" class="nav-links">
                        <a href="home.html">Home</a>
                        <a href="characters.html">Characters</a>
                        <a href="gwent.html">Gwent</a>
                        <a href="map.html">Map</a>
                        <a href="timeline.html">Timeline</a>
                        <a href="book.html">Books</a>
                        <a href="schools.html">Schools</a>
                        <a href="bestiary.html">Bestiary</a>
                        <a href="gallery.html">Gallery</a>
                        <a href="feedback.html" aria-current="page">Feedback</a>
                    </div>
                </div>
            </div>
            <div class="page-inner">
                <h1>Feedback</h1>
                <p class="feedback-lede" id="feedback-intro-lead">
                    If you spot a mistake, a broken link, or something you wish we would add, say
                    so in the form below.
                </p>
                <div class="feedback-form-wrap">
                    <form
                        id="feedback-form"
                        action="#"
                        method="post"
                        aria-describedby="feedback-intro-lead"
                    >
                        <div
                            id="feedback-form-status"
                            class="feedback-form-status"
                            role="status"
                            aria-live="polite"
                            aria-atomic="true"
                            hidden
                        ></div>
                        <div
                            id="feedback-form-error"
                            class="feedback-form-error"
                            role="alert"
                            aria-live="assertive"
                            aria-atomic="true"
                            hidden
                        ></div>
                        <div class="form-group">
                            <label for="fullname">Full name</label>
                            <input
                                type="text"
                                name="fullname"
                                id="fullname"
                                autocomplete="name"
                                required
                                aria-required="true"
                                placeholder="e.g. Geralt of Rivia"
                                minlength="2"
                                maxlength="80"
                            />
                        </div>
                        <div class="form-group">
                            <label for="email">Email address</label>
                            <input
                                type="email"
                                name="email"
                                id="email"
                                autocomplete="email"
                                required
                                aria-required="true"
                                placeholder="you@example.com"
                                inputmode="email"
                                maxlength="120"
                            />
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input
                                type="text"
                                name="subject"
                                id="subject"
                                autocomplete="off"
                                required
                                aria-required="true"
                                placeholder="Feedback on the bestiary"
                                minlength="4"
                                maxlength="120"
                            />
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea
                                name="message"
                                id="message"
                                rows="4"
                                required
                                aria-required="true"
                                placeholder="Your message…"
                                minlength="12"
                                maxlength="2000"
                            ></textarea>
                        </div>
                        <div class="form-group form-group--submit">
                            <button type="submit" id="feedback-submit-btn">Send message</button>
                            <button type="button" id="feedback-reset-btn" class="feedback-reset-btn" hidden>
                                Send another
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="footer">
                <div class="footer-inner">
                    <div class="footer-row">
                        <div class="footer-copy">
                            <span class="footer-brand">TW</span
                            ><span class="footer-site"> DB</span> &copy; 2026 | All rights reserved
                        </div>
                        <div class="footer-dev">
                            Developed &amp; Designed by
                            <a href="https://github.com/ckagias" target="_blank"
                                >Christoforos Kagias</a
                            >
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                var form = document.getElementById("feedback-form");
                var btn = document.getElementById("feedback-submit-btn");
                var resetBtn = document.getElementById("feedback-reset-btn");
                var statusEl = document.getElementById("feedback-form-status");
                var errEl = document.getElementById("feedback-form-error");
                if (!form || !btn) return;

                function showError(message) {
                    if (!errEl) return;
                    errEl.textContent = message;
                    errEl.removeAttribute("hidden");
                }

                function clearMessages() {
                    if (errEl) {
                        errEl.setAttribute("hidden", "");
                        errEl.textContent = "";
                    }
                    if (statusEl) {
                        statusEl.setAttribute("hidden", "");
                        statusEl.textContent = "";
                    }
                }

                function fieldLabelFor(el) {
                    if (!el || !el.id) return "This field";
                    var label = form.querySelector('label[for="' + el.id + '"]');
                    return label ? String(label.textContent || "").trim() : "This field";
                }

                function setUpValidationCopy() {
                    var full = document.getElementById("fullname");
                    var email = document.getElementById("email");
                    var subject = document.getElementById("subject");
                    var message = document.getElementById("message");

                    function clearCustom(el) {
                        if (el && typeof el.setCustomValidity === "function") {
                            el.setCustomValidity("");
                        }
                    }

                    function onEmailInvalid() {
                        if (!email || typeof email.setCustomValidity !== "function") return;
                        clearCustom(email);
                        var v = String(email.value || "").trim();
                        if (!v) return;
                        if (v.indexOf("@") === -1) {
                            email.setCustomValidity("Email addresses need an @ symbol. Example: name@example.com");
                        }
                    }

                    if (full) {
                        full.addEventListener("input", function () {
                            clearCustom(full);
                        });
                    }
                    if (email) {
                        email.addEventListener("input", function () {
                            clearCustom(email);
                        });
                        email.addEventListener("blur", onEmailInvalid);
                        email.addEventListener("invalid", onEmailInvalid);
                    }
                    if (subject) {
                        subject.addEventListener("input", function () {
                            clearCustom(subject);
                        });
                    }
                    if (message) {
                        message.addEventListener("input", function () {
                            clearCustom(message);
                        });
                    }
                }

                setUpValidationCopy();

                form.addEventListener("submit", function (e) {
                    e.preventDefault();
                    clearMessages();

                    // Let native validation run first (required/email format).
                    if (typeof form.reportValidity === "function" && !form.reportValidity()) {
                        var firstInvalid = form.querySelector(":invalid");
                        if (firstInvalid) {
                            var msg = firstInvalid.validationMessage || "Please check this field.";
                            showError(fieldLabelFor(firstInvalid) + ": " + msg);
                            if (typeof firstInvalid.focus === "function") {
                                firstInvalid.focus();
                            }
                        } else {
                            showError("Please check the highlighted fields and try again.");
                        }
                        return;
                    }

                    btn.disabled = true;
                    btn.textContent = "Sending\u2026";

                    window.setTimeout(function () {
                        // Simulate realistic failure cases (offline / occasional server error)
                        var offline = typeof navigator !== "undefined" && navigator && navigator.onLine === false;
                        if (offline) {
                            btn.disabled = false;
                            btn.textContent = "Send message";
                            showError(
                                "You appear to be offline. Check your connection, then try again."
                            );
                            return;
                        }

                        btn.textContent = "\u2713 Sent";
                        btn.setAttribute("aria-label", "Message sent (simulated)");
                        if (statusEl) {
                            statusEl.innerHTML =
                                "<strong>Message sent.</strong> Thanks for helping improve The Witcher DB. " +
                                "If you want to send more feedback, choose <em>Send another</em>.";
                            statusEl.removeAttribute("hidden");
                        }
                        if (resetBtn) {
                            resetBtn.removeAttribute("hidden");
                            resetBtn.disabled = false;
                        }
                        btn.disabled = true;
                    }, 550);
                });

                if (resetBtn) {
                    resetBtn.addEventListener("click", function () {
                        form.reset();
                        btn.disabled = false;
                        btn.textContent = "Send message";
                        btn.removeAttribute("aria-label");
                        resetBtn.setAttribute("hidden", "");
                        clearMessages();
                        var first = document.getElementById("fullname");
                        if (first && typeof first.focus === "function") {
                            first.focus();
                        }
                    });
                }
            });
        </script>
    </body>
</html>
